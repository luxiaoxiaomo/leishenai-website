<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="雷神的 AI Agent 项目展示：知识治理、数据治理、HR AI Agent">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="AI 项目 - 雷神">
  <meta property="og:description" content="从理论框架到落地实践：微信归档助手、HR AI Agent、知识治理、数据治理、五层治理栈。">

  <meta property="og:url" content="https://leishenai.ccwu.cc/projects.html">
  <meta property="og:locale" content="zh_CN">
  <link rel="icon" type="image/jpeg" href="assets/img/头像.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Noto+Serif+SC:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/vars.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">
  <style>
    .page-header {
      padding-top: var(--space-8);
      padding-bottom: var(--space-4);
      text-align: center;
    }

    .page-header h1 {
      margin-bottom: var(--space-2);
    }

    .page-header p {
      color: var(--muted);
      font-size: 18px;
    }

    .projects-section {
      padding-bottom: var(--space-12);
    }

    .projects-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .project-card {
      background: var(--elevated);
      border: 1px solid var(--hair);
      border-radius: 6px;
      padding: 16px;
      transition: border-color 0.15s;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .project-card:hover {
      border-color: var(--accent);
    }

    .project-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .project-card-icon {
      font-size: 16px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .project-card-title {
      flex: 1;
      min-width: 0;
    }

    .project-card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 0;
      line-height: 1.3;
      color: #0969da;
    }

    .project-card-summary {
      font-size: 14px;
      color: var(--ink-2);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .project-card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .project-card-highlights {
      list-style: none;
      padding: 0;
      margin: 0 0 12px 0;
    }

    .project-card-highlights li {
      font-size: 13px;
      color: var(--ink-2);
      line-height: 1.5;
      padding: 2px 0 2px 16px;
      position: relative;
    }

    .project-card-highlights li::before {
      content: '·';
      position: absolute;
      left: 4px;
      color: var(--muted);
      font-weight: 700;
    }

    .project-card-section {
      margin-bottom: 12px;
    }

    .project-card-section p {
      font-size: 13px;
      color: var(--ink-2);
      line-height: 1.7;
      margin: 4px 0 0 0;
    }

    .project-card-section .project-card-highlights {
      margin-bottom: 0;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      background: var(--subtle, #f6f8fa);
      padding: 2px 6px;
      border-radius: 3px;
    }

    .project-card-footer {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: auto;
      padding-top: 12px;
    }

    .project-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
      padding-top: 12px;
    }

    .project-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .project-tag::before {
      content: '';
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.7;
    }

    .project-status {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
    }

    @media (max-width: 768px) {
      .projects-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="topnav">
    <div class="topnav-inner">
      <a href="index.html" class="topnav-brand">雷神</a>
      <div class="topnav-links">
        <a href="index.html">首页</a>
        <a href="about.html">关于</a>
        <a href="projects.html" class="active">AI项目</a>
        <a href="portfolio.html">作品集</a>
        <a href="blog/index.html">博客</a>
        <a href="news.html">报道</a>
        <a href="speaking.html">课程</a>
      </div>
      <button class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- 页面头部 -->
  <div class="page-header">
    <div class="container">
      <h1>AI 项目</h1>
      <p>从理论框架到落地实践，构建 AI 原生组织</p>
    </div>
  </div>

  <!-- 项目列表 -->
  <section class="projects-section">
    <div class="container">
      <div class="projects-list" id="projectsList">
        <!-- 动态加载 -->
      </div>
    </div>
  </section>

  <script>
    // 导航菜单
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.querySelector('.topnav-links');

    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('active');
      navLinks.classList.toggle('active');
    });

    // 加载所有项目
    fetch('data/projects.json')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('projectsList');

        const statusText = {
          'in_progress': '进行中',
          'live': '已上线',
          'done': '已完成',
          'concept': '概念阶段'
        };

        data.projects.forEach(project => {
          const card = document.createElement('div');
          card.className = 'project-card';

          const problemHtml = project.problem
            ? `<div class="project-card-section"><span class="section-label">痛点</span><p>${project.problem}</p></div>`
            : '';

          const approachHtml = project.approach
            ? `<div class="project-card-section"><span class="section-label">思路</span><p>${project.approach}</p></div>`
            : '';

          const highlightsHtml = project.highlights
            ? `<div class="project-card-section"><span class="section-label">技术亮点</span><ul class="project-card-highlights">${project.highlights.map(h => `<li>${h}</li>`).join('')}</ul></div>`
            : '';

          card.innerHTML = `
            <div class="project-card-header">
              <div class="project-card-icon">📦</div>
              <div class="project-card-title">
                <h3>${project.name}</h3>
              </div>
            </div>
            <div class="project-card-summary">${project.summary}</div>
            ${problemHtml}
            ${approachHtml}
            ${highlightsHtml}
            <div class="project-card-tags">
              ${project.tags.map(tag => `<span class="project-tag">${tag}</span>`).join('')}
              <span class="project-status">${statusText[project.status]}</span>
            </div>
          `;
          container.appendChild(card);
        });
      });
  </script>

        },
        {

        }

  }
  </script>
</body>
</html>
